name: Public Surface Audit

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Validate public release manifests
        run: node scripts/validate_public_release_manifests.mjs
      - name: Validate public release state
        run: node scripts/validate_public_release_state.mjs
      - name: Sync public release links
        run: node scripts/sync_public_release_links.mjs --check
      - name: Audit public secrets
        run: node scripts/audit_public_secrets.mjs
      - name: Audit public surface
        run: python scripts/audit_public_surface.py
