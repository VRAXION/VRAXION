name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  rust-runtime-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rust format
        run: cargo fmt --check -p vraxion-runtime

      - name: Rust clippy
        run: cargo clippy -p vraxion-runtime --all-targets -- -D warnings

      - name: Rust runtime tests
        run: cargo test -p vraxion-runtime

      - name: Final bake smoke with progress artifacts
        run: |
          cargo run --release -p vraxion-runtime --bin final_bake_preflight -- 1000 target/ci/e74_final_bake_smoke
          test -f target/ci/e74_final_bake_smoke/progress.jsonl
          test -f target/ci/e74_final_bake_smoke/final_bake_results.json
          test -f target/ci/e74_final_bake_smoke/report.md
