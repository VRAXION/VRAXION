name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  rust-runtime-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rust format
        run: cargo fmt --check -p vraxion-runtime

      - name: Rust clippy
        run: cargo clippy -p vraxion-runtime --all-targets -- -D warnings

      - name: Rust runtime tests
        run: cargo test -p vraxion-runtime

      - name: Final bake smoke with progress artifacts
        run: |
          cargo run --release -p vraxion-runtime --bin final_bake_preflight -- 1000 target/ci/e78_final_bake_smoke
          test -f target/ci/e78_final_bake_smoke/progress.jsonl
          test -f target/ci/e78_final_bake_smoke/final_bake_results.json
          test -f target/ci/e78_final_bake_smoke/report.md

      - name: Training data readiness smoke with progress artifacts
        run: |
          cargo run --release -p vraxion-runtime --bin training_data_readiness -- 3 8 target/ci/e79_training_data_readiness_smoke
          test -f target/ci/e79_training_data_readiness_smoke/training_data_readiness_progress.jsonl
          test -f target/ci/e79_training_data_readiness_smoke/training_data_readiness_results.json
          test -f target/ci/e79_training_data_readiness_smoke/training_data_readiness_manifest.json
          test -f target/ci/e79_training_data_readiness_smoke/training_curriculum_manifest.jsonl
          test -f target/ci/e79_training_data_readiness_smoke/training_data_readiness_report.md

      - name: Canonical final train smoke with progress artifacts
        run: |
          cargo run --release -p vraxion-runtime --bin final_train -- 3 8 target/ci/e79_final_train_smoke --preflight-rounds 4 --checkpoint-interval 4
          test -f target/ci/e79_final_train_smoke/final_train_progress.jsonl
          test -f target/ci/e79_final_train_smoke/final_train_results.json
          test -f target/ci/e79_final_train_smoke/final_train_manifest.json
          test -f target/ci/e79_final_train_smoke/final_train_report.md
          test -f target/ci/e79_final_train_smoke/training_data_readiness/training_data_readiness_results.json
          test -f target/ci/e79_final_train_smoke/training_data_readiness/training_data_readiness_manifest.json
          test -f target/ci/e79_final_train_smoke/training_data_readiness/training_data_readiness_progress.jsonl
          test -f target/ci/e79_final_train_smoke/training_data_readiness/training_curriculum_manifest.jsonl
          test -f target/ci/e79_final_train_smoke/global_supervisor/global_merge_results.json
          test -f target/ci/e79_final_train_smoke/global_supervisor/global_library_summary.json
          test -f target/ci/e79_final_train_smoke/global_supervisor/lane_supervisor/supervisor_results.json

  evidence-sample-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python compile
        run: python -m compileall -q scripts

      - name: Tracked JSON and JSONL parse
        run: |
          python - <<'PY'
          import json
          import pathlib
          import subprocess

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for name in files:
              path = pathlib.Path(name)
              if path.suffix == ".json":
                  json.loads(path.read_text(encoding="utf-8"))
              elif path.suffix == ".jsonl":
                  for line_no, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                      if line.strip():
                          try:
                              json.loads(line)
                          except json.JSONDecodeError as exc:
                              raise SystemExit(f"{path}:{line_no}: {exc}") from exc
          print("tracked_json_and_jsonl_parse_ok")
          PY

      - name: Evidence sample checkers
        run: |
          python scripts/probes/run_e89_operator_naming_canonicalization_check.py
          python scripts/probes/run_e107_operator_library_e90_e106_survival_role_and_regression_gauntlet_check.py --sample-only docs/research/artifact_samples/e107_operator_library_e90_e106_survival_role_and_regression_gauntlet
          python scripts/probes/run_e108_external_dataset_operator_transfer_and_negative_scope_gauntlet_check.py --sample-only docs/research/artifact_samples/e108_external_dataset_operator_transfer_and_negative_scope_gauntlet
          python scripts/probes/run_e109_operator_rank_ladder_and_golden_watch_probation_mode_check.py --sample-only docs/research/artifact_samples/e109_operator_rank_ladder_and_golden_watch_probation_mode
          python scripts/probes/run_e110_promote_or_drop_operator_grind_wave1_check.py --sample-only docs/research/artifact_samples/e110_promote_or_drop_operator_grind_wave1
          python scripts/probes/run_e111_bronze_mutation_prune_promote_or_drop_wave_check.py --sample-only docs/research/artifact_samples/e111_bronze_mutation_prune_promote_or_drop_wave
          python scripts/probes/run_e112_gold_to_core_prune_heavy_probation_wave_check.py --sample-only docs/research/artifact_samples/e112_gold_to_core_prune_heavy_probation_wave

      - name: Operator rank dashboard smoke
        run: |
          python scripts/tools/generate_operator_rank_dashboard.py --out target/ci/operator_rank_dashboard/index.html
          python - <<'PY'
          import pathlib
          import re
          import subprocess

          html = pathlib.Path("target/ci/operator_rank_dashboard/index.html").read_text(encoding="utf-8")
          match = re.search(r"<script>\s*(.*?)\s*</script>", html, re.S)
          if not match:
              raise SystemExit("dashboard script block missing")
          js_path = pathlib.Path("target/ci/operator_rank_dashboard/dashboard.js")
          js_path.write_text(match.group(1), encoding="utf-8")
          subprocess.run(["node", "--check", str(js_path)], check=True)
          if "E136B assistant text route composition and boundary confirm" not in html:
              raise SystemExit("dashboard did not load E136B assistant-text route-composition evidence")
          if "E136B route comp" not in html:
              raise SystemExit("dashboard did not render E136B route composition card")
          if "E136B stack" not in html:
              raise SystemExit("dashboard did not render E136B stack card")
          if "E136B boundary" not in html:
              raise SystemExit("dashboard did not render E136B boundary card")
          if "E136A assistant text" not in html:
              raise SystemExit("dashboard did not render E136A assistant text card")
          if "E136A support min" not in html:
              raise SystemExit("dashboard did not render E136A support card")
          if "E136A direct writes" not in html:
              raise SystemExit("dashboard did not render E136A direct-write card")
          if "E135 dialogue state" not in html:
              raise SystemExit("dashboard did not load E135 dialogue-state evidence")
          if "E135 dialogue" not in html:
              raise SystemExit("dashboard did not render E135 dialogue card")
          if "E135 state integrity" not in html:
              raise SystemExit("dashboard did not render E135 state integrity card")
          if "E134 OOD pass" not in html:
              raise SystemExit("dashboard did not load E134 OOD route-stress evidence")
          if "E134 counterexamples" not in html:
              raise SystemExit("dashboard did not render E134 counterexample card")
          if "E133 route comp" not in html:
              raise SystemExit("dashboard did not load E133 math-text route-composition evidence")
          if "E132 math-text" not in html:
              raise SystemExit("dashboard did not retain E132 external math-text skill evidence")
          if "E131 visible eq" not in html:
              raise SystemExit("dashboard did not retain E131 visible equation evidence")
          if "E130B transfer" not in html:
              raise SystemExit("dashboard did not load E130B arithmetic text-IO transfer evidence")
          if "E130A backfill" not in html:
              raise SystemExit("dashboard did not retain E130A Orange backfill evidence")
          if "E129 arithmetic trace" not in html:
              raise SystemExit("dashboard did not retain E129 arithmetic trace evidence")
          PY

      - name: Front-door stale current-claim guard
        run: |
          python - <<'PY'
          import pathlib

          files = [
              pathlib.Path("README.md"),
              pathlib.Path("VALIDATED_FINDINGS.md"),
              pathlib.Path("CHANGELOG.md"),
              pathlib.Path("BETA.md"),
              pathlib.Path("docs/CURRENT_STATUS.md"),
              pathlib.Path("docs/GETTING_STARTED.md"),
              pathlib.Path("docs/VERSION.json"),
              pathlib.Path("docs/index.html"),
          ]
          stale = [
              "E85 MAIN",
              "current_main_head = 56a9cf",
              '"current_main_head": "56a9cf',
              "Current main head: 56a9cf",
              "current_main_subject = Add E85",
              '"current_main_head_subject": "Add E85',
              "Current E85 extension",
              "E80-E85 are tracked post-release evidence",
              "current E85 mainline",
              "E111 MAIN",
              "current_main_head = d71e3657",
              '"current_main_head": "d71e3657',
              "current_main_subject = Add E111",
              '"current_main_head_subject": "Add E111',
              "E80-E111 are tracked post-release evidence",
              "current E111 mainline",
              "E112 EVIDENCE",
              "current_evidence_subject = Add E112",
              '"current_evidence_subject": "Add E112',
              "E80-E112 are tracked post-release evidence",
              "current E112 evidence anchor",
              "current_evidence_anchor = E129_ARITHMETIC_TRACE_ORANGE_LEGENDARY_PROBATION",
              '"current_evidence_anchor": "E129_ARITHMETIC_TRACE_ORANGE_LEGENDARY_PROBATION"',
              "current_evidence_anchor = E129 arithmetic trace Orange/Legendary probation",
              "Current evidence anchor: E129 arithmetic trace Orange/Legendary probation",
              "current_evidence_anchor = E130A_COREMEMORY_TO_ORANGE_BACKFILL_GAUNTLET",
              '"current_evidence_anchor": "E130A_COREMEMORY_TO_ORANGE_BACKFILL_GAUNTLET"',
              "current_evidence_anchor = E130A CoreMemoryCandidate-to-Orange backfill gauntlet",
              "Current evidence anchor: E130A CoreMemoryCandidate-to-Orange backfill gauntlet",
              "current_evidence_anchor = E130B_ARITHMETIC_TEXT_IO_TRANSFER_AND_WORD_PROBLEM_NO_CALL_GAUNTLET",
              '"current_evidence_anchor": "E130B_ARITHMETIC_TEXT_IO_TRANSFER_AND_WORD_PROBLEM_NO_CALL_GAUNTLET"',
              "current_evidence_anchor = E130B arithmetic text-IO transfer and word-problem no-call gauntlet",
              "current_evidence_anchor = E132_EXTERNAL_MATH_TEXT_SKILL_FARM_MUTATION_PRUNE_ORANGE_CYCLE",
              '"current_evidence_anchor": "E132_EXTERNAL_MATH_TEXT_SKILL_FARM_MUTATION_PRUNE_ORANGE_CYCLE"',
              "current_evidence_anchor = E132 external math text skill farm mutation/prune Orange cycle",
              "Current evidence anchor: E132 external math text skill farm mutation/prune Orange cycle",
              "Current evidence anchor: E130B arithmetic text-IO transfer and word-problem no-call gauntlet",
              "current_evidence_anchor = E131_VISIBLE_EQUATION_EXTRACTION_AND_ASSISTANT_ARITHMETIC_RENDER_GAUNTLET",
              '"current_evidence_anchor": "E131_VISIBLE_EQUATION_EXTRACTION_AND_ASSISTANT_ARITHMETIC_RENDER_GAUNTLET"',
              "current_evidence_anchor = E131 visible equation extraction and assistant arithmetic render gauntlet",
              "Current evidence anchor: E131 visible equation extraction and assistant arithmetic render gauntlet",
              "current_evidence_anchor = E133_MATH_TEXT_ROUTE_COMPOSITION_AND_NO_SOLVE_ASSISTANT_CONFIRM",
              '"current_evidence_anchor": "E133_MATH_TEXT_ROUTE_COMPOSITION_AND_NO_SOLVE_ASSISTANT_CONFIRM"',
              "current_evidence_anchor = E133 math text route composition and no-solve assistant confirm",
              "Current evidence anchor: E133 math text route composition and no-solve assistant confirm",
              "current_evidence_anchor = E134_EXTERNAL_MATH_TEXT_OOD_ROUTE_STRESS_AND_COUNTEREXAMPLE_GAUNTLET",
              '"current_evidence_anchor": "E134_EXTERNAL_MATH_TEXT_OOD_ROUTE_STRESS_AND_COUNTEREXAMPLE_GAUNTLET"',
              "current_evidence_anchor = E134 external math-text OOD route stress and counterexample gauntlet",
              "Current evidence anchor: E134 external math-text OOD route stress and counterexample gauntlet",
              "current_evidence_anchor = E135_MATH_TEXT_MULTI_ROUTE_ASSISTANT_DIALOGUE_STATE_GAUNTLET",
              '"current_evidence_anchor": "E135_MATH_TEXT_MULTI_ROUTE_ASSISTANT_DIALOGUE_STATE_GAUNTLET"',
              "current_evidence_anchor = E135 math-text multi-route assistant dialogue-state gauntlet",
              "Current evidence anchor: E135 math-text multi-route assistant dialogue-state gauntlet",
              "current_evidence_anchor = E136A_ASSISTANT_TEXT_SKILL_FARM_MUTATION_PRUNE_ORANGE_CYCLE",
              '"current_evidence_anchor": "E136A_ASSISTANT_TEXT_SKILL_FARM_MUTATION_PRUNE_ORANGE_CYCLE"',
              "current_evidence_anchor = E136A assistant-text skill farm mutation/prune Orange cycle",
              "Current evidence anchor: E136A assistant-text skill farm mutation/prune Orange cycle",
              "current_evidence_anchor = E136B_ASSISTANT_TEXT_ROUTE_COMPOSITION_AND_BOUNDARY_CONFIRM",
              '"current_evidence_anchor": "E136B_ASSISTANT_TEXT_ROUTE_COMPOSITION_AND_BOUNDARY_CONFIRM"',
              "current_evidence_anchor = E136B assistant-text route composition and boundary confirm",
              "Current evidence anchor: E136B assistant-text route composition and boundary confirm",
              "current_evidence_anchor = E136C_ASSISTANT_TEXT_POLISHED_RENDER_QUICK_TEST",
              '"current_evidence_anchor": "E136C_ASSISTANT_TEXT_POLISHED_RENDER_QUICK_TEST"',
              "current_evidence_anchor = E136C assistant-text polished render quick test",
              "Current evidence anchor: E136C assistant-text polished render quick test",
          ]
          failures = []
          for path in files:
              text = path.read_text(encoding="utf-8")
              for pattern in stale:
                  if pattern in text:
                      failures.append(f"{path}: stale current pattern {pattern!r}")
          if failures:
              raise SystemExit("\n".join(failures))
          print("frontdoor_stale_current_claim_guard_ok")
          PY
