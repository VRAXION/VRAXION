name: Public SDK CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: INSTNCT static smoke
        run: |
          node --check scripts/audit_instnct_static_site.mjs
          node --check scripts/audit_instnct_notify_worker.mjs
          node --check scripts/sync_public_release_links.mjs
          node --check scripts/smoke_instnct_notify_live.mjs
          node --check scripts/smoke_public_pages_links.mjs
          node --check scripts/smoke_instnct_browser.mjs
          node --check docs/instnct/instnct.js
          node scripts/sync_public_release_links.mjs --check
          node scripts/audit_instnct_static_site.mjs
          node scripts/audit_instnct_notify_worker.mjs
      - name: INSTNCT browser smoke
        run: |
          npm install --prefix "$RUNNER_TEMP/instnct-playwright" --no-save --no-audit --no-fund playwright@1.61.1
          "$RUNNER_TEMP/instnct-playwright/node_modules/.bin/playwright" install --with-deps chromium
          PLAYWRIGHT_MODULE_ROOT="$RUNNER_TEMP/instnct-playwright/node_modules" node scripts/smoke_instnct_browser.mjs

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Public export guard
        shell: pwsh
        run: ./scripts/check_public_export.ps1
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test
        run: cargo test --workspace --all-features
      - name: Doc tests
        run: cargo test --doc --workspace --all-features
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Docs
        run: cargo doc --workspace --no-deps
