name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  python-deploy-sdk-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile sanity
        run: |
          python -m compileall Python tools

      - name: Python deploy SDK tests (Block A + B)
        run: |
          python -m pytest Python/ -q

      - name: Public surface consistency
        run: |
          python tools/check_public_surface.py

      - name: Wiki mirror dry-run
        run: |
          python tools/sync_wiki_from_repo.py --dry-run
