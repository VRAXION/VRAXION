name: Public Pages Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

jobs:
  live-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Smoke live public Pages links
        run: node scripts/smoke_public_pages_links.mjs
