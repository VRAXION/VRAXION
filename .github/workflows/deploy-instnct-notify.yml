name: Deploy INSTNCT Notify Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Preflight required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INSTNCT_NOTIFY_D1_DATABASE_ID: ${{ secrets.INSTNCT_NOTIFY_D1_DATABASE_ID }}
          INSTNCT_NOTIFY_EMAIL_HASH_PEPPER: ${{ secrets.INSTNCT_NOTIFY_EMAIL_HASH_PEPPER }}
          INSTNCT_NOTIFY_ADMIN_TOKEN: ${{ secrets.INSTNCT_NOTIFY_ADMIN_TOKEN }}
          INSTNCT_NOTIFY_API_BASE: ${{ secrets.INSTNCT_NOTIFY_API_BASE }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID INSTNCT_NOTIFY_D1_DATABASE_ID INSTNCT_NOTIFY_EMAIL_HASH_PEPPER INSTNCT_NOTIFY_ADMIN_TOKEN INSTNCT_NOTIFY_API_BASE; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub secret::$name is required for INSTNCT notify production deploy"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Wrangler config
        working-directory: workers/instnct-notify
        env:
          D1_DATABASE_ID: ${{ secrets.INSTNCT_NOTIFY_D1_DATABASE_ID }}
        run: |
          test -n "$D1_DATABASE_ID"
          cp wrangler.example.jsonc wrangler.jsonc
          node -e "const fs=require('fs'); const p='wrangler.jsonc'; const id=process.env.D1_DATABASE_ID; fs.writeFileSync(p, fs.readFileSync(p,'utf8').replace('00000000-0000-0000-0000-000000000000', id));"

      - name: Validate Worker
        run: |
          node --check workers/instnct-notify/src/index.mjs
          node scripts/audit_instnct_notify_worker.mjs

      - name: Apply D1 migrations
        working-directory: workers/instnct-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.107.0 d1 migrations apply vraxion-instnct-notify --remote

      - name: Set Worker secret
        working-directory: workers/instnct-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          EMAIL_HASH_PEPPER: ${{ secrets.INSTNCT_NOTIFY_EMAIL_HASH_PEPPER }}
          ADMIN_TOKEN: ${{ secrets.INSTNCT_NOTIFY_ADMIN_TOKEN }}
        run: |
          test -n "$EMAIL_HASH_PEPPER"
          test -n "$ADMIN_TOKEN"
          printf "%s" "$EMAIL_HASH_PEPPER" | npx wrangler@4.107.0 secret put EMAIL_HASH_PEPPER
          printf "%s" "$ADMIN_TOKEN" | npx wrangler@4.107.0 secret put ADMIN_TOKEN

      - name: Operator-only Worker deploy
        working-directory: workers/instnct-notify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4.107.0 deploy

      - name: Smoke deployed Worker
        env:
          INSTNCT_NOTIFY_API_BASE: ${{ secrets.INSTNCT_NOTIFY_API_BASE }}
          INSTNCT_NOTIFY_ALLOWED_ORIGIN: https://vraxion.github.io
          INSTNCT_NOTIFY_ADMIN_TOKEN: ${{ secrets.INSTNCT_NOTIFY_ADMIN_TOKEN }}
        run: node scripts/smoke_instnct_notify_live.mjs
