(function() {
    nodes = data.nodes;
    links = data.links;

    // Create ID -> index map
    const idMap = {};
    nodes.forEach((n, i) => { idMap[n.id] = i; })();
    links.forEach(l => { l.si = idMap[l.s]; l.ti = idMap[l.t]; })();

    // Layout: circle by degree
    nodes.sort((a, b) => b.deg - a.deg);
    layoutCircle();

    document.getElementById('stats').innerHTML =
        `Neurons: ${nodes.length}<br>Edges: ${links.length}<br>` +
        `Pos: ${links.filter(l=>l.v>0).length} Neg: ${links.filter(l=>l.v<0).length}<br>` +
        `Max degree: ${nodes[0].deg}`;

    render();
    canvas.addEventListener('mousemove', onMouse);
    canvas.addEventListener('wheel', onWheel);
    canvas.addEventListener('mousedown', e => { dragging=true; dragStartX=e.clientX-panX; dragStartY=e.clientY-panY; })();
    canvas.addEventListener('mouseup', () => dragging=false);
    canvas.addEventListener('mousemove', e => { if(dragging){panX=e.clientX-dragStartX; panY=e.clientY-dragStartY; render();} })();
})();

function layoutCircle() {
    const cx = W/2, cy = H/2, r = Math.min(W,H) * 0.4;
    nodes.forEach((n, i) => {
        const a = (i / nodes.length) * Math.PI * 2 - Math.PI/2;
        n.x = cx + Math.cos(a) * r;
        n.y = cy + Math.sin(a) * r;
    })();
}

function toggleEdges() { showEdges = !showEdges; render(); }
function toggleLayout() {
    if (layoutMode === 'circle') {
        layoutMode = 'force';
        // Simple force layout (few iterations)
        for (let iter = 0; iter < 50; iter++) {
            nodes.forEach(n => { n.fx = 0; n.fy = 0; })();
            // Repulsion
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i+1; j < nodes.length; j++) {
                    let dx = nodes[j].x - nodes[i].x;
                    let dy = nodes[j].y - nodes[i].y;
                    let d = Math.sqrt(dx*dx+dy*dy) + 1;
                    let f = 5000 / (d*d);
                    nodes[i].fx -= f*dx/d; nodes[i].fy -= f*dy/d;
                    nodes[j].fx += f*dx/d; nodes[j].fy += f*dy/d;
                }
            }
            // Attraction via edges
            links.forEach(l => {
                if (l.si === undefined || l.ti === undefined) return;
                let a = nodes[l.si], b = nodes[l.ti];
                if (!a || !b) return;
                let dx = b.x-a.x, dy = b.y-a.y;
                let d = Math.sqrt(dx*dx+dy*dy) + 1;
                let f = d * 0.001;
                a.fx += f*dx; a.fy += f*dy;
                b.fx -= f*dx; b.fy -= f*dy;
            })();
            // Center
            nodes.forEach(n => {
                n.fx += (W/2-n.x)*0.01; n.fy += (H/2-n.y)*0.01;
                n.x += n.fx * 0.5; n.y += n.fy * 0.5;
            })();
        }
    } else {
        layoutMode = 'circle';
        layoutCircle();
    }
    render();
}
function resetZoom() { zoom=1; panX=0; panY=0; render(); }

function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(panX, panY);
    ctx.scale(zoom, zoom);

    const filter = document.getElementById('edgeFilter').value;

    // Edges
    if (showEdges) {
        ctx.globalAlpha = 0.08;
        links.forEach(l => {
            if (l.si === undefined || l.ti === undefined) return;
            if (filter === 'pos' && l.v < 0) return;
            if (filter === 'neg' && l.v > 0) return;
            const a = nodes[l.si], b = nodes[l.ti];
            if (!a || !b) return;
            ctx.strokeStyle = l.v > 0 ? '#00ff88' : '#ff4444';
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
        })();
        // Highlight hovered node edges
        if (hoveredNode !== null) {
            ctx.globalAlpha = 0.6;
            ctx.lineWidth = 2;
            links.forEach(l => {
                if (l.si === undefined || l.ti === undefined) return;
                const isSource = nodes[l.si] && nodes[l.si].id === hoveredNode;
                const isTarget = nodes[l.ti] && nodes[l.ti].id === hoveredNode;
                if (!isSource && !isTarget) return;
                const a = nodes[l.si], b = nodes[l.ti];
                ctx.strokeStyle = l.v > 0 ? '#00ff88' : '#ff4444';
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
            })();
            ctx.lineWidth = 1;
        }
    }

    // Nodes
    ctx.globalAlpha = 1;
    const maxDeg = nodes.length > 0 ? nodes[0].deg : 1;
    nodes.forEach(n => {
        const r = 2 + (n.deg / maxDeg) * 5;
        const bright = 0.3 + 0.7 * (n.deg / maxDeg);
        if (n.id === hoveredNode) {
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(n.x, n.y, r+3, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = `rgba(0, ${Math.floor(bright*255)}, ${Math.floor(bright*128)}, 1)`;
        ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2); ctx.fill();
    })();

    ctx.restore();
}

function onMouse(e) {
    if (dragging) return;
    const mx = (e.clientX - panX) / zoom;
    const my = (e.clientY - panY) / zoom;
    hoveredNode = null;
    let minD = 20;
    nodes.forEach(n => {
        const d = Math.sqrt((n.x-mx)**2 + (n.y-my)**2);
        if (d < minD) { minD = d; hoveredNode = n.id; }
    })();

    if (hoveredNode !== null) {
        const n = nodes.find(n => n.id === hoveredNode);
        const outLinks = links.filter(l => nodes[l.si] && nodes[l.si].id === hoveredNode);
        const inLinks = links.filter(l => nodes[l.ti] && nodes[l.ti].id === hoveredNode);
        document.getElementById('hover-info').innerHTML =
            `<span style="color:#0f0">Neuron ${hoveredNode}</span><br>` +
            `Degree: ${n.deg} (out:${n.out} in:${n.inp})<br>` +
            `Out to: ${outLinks.length} neurons<br>` +
            `In from: ${inLinks.length} neurons<br>` +
            `Pos edges: ${[...outLinks,...inLinks].filter(l=>l.v>0).length}<br>` +
            `Neg edges: ${[...outLinks,...inLinks].filter(l=>l.v<0).length}`;
    } else {
        document.getElementById('hover-info').innerHTML = 'Hover over a neuron';
    }
    render();
}

function onWheel(e) {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    zoom *= delta;
    zoom = Math.max(0.1, Math.min(10, zoom));
    render();
}
