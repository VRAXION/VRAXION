<!DOCTYPE html>
<html><head>
<style>
  body { background: #181b1f; margin: 0; padding: 8px; font-family: monospace; color: #ccc; }
  .row { display: flex; gap: 12px; margin-bottom: 8px; }
  .frame { flex: 1; text-align: center; }
  .frame img { width: 100%; image-rendering: pixelated; }
  .label { font-size: 11px; margin-bottom: 4px; opacity: 0.7; }
</style>
<script>
  // Auto-refresh images every 2 seconds
  setInterval(() => {
    const t = Date.now();
    document.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('data-src');
      img.src = src + '?t=' + t;
    });
  }, 2000);
</script>
</head><body>
<div class="row">
  <div class="frame">
    <div class="label">Input Frame</div>
    <img data-src="input.png" src="input.png">
  </div>
  <div class="frame">
    <div class="label">Output Frame</div>
    <img data-src="output.png" src="output.png">
  </div>
</div>
<div class="row">
  <div class="frame">
    <div class="label">LCX Before</div>
    <img data-src="lcx_before.png" src="lcx_before.png">
  </div>
  <div class="frame">
    <div class="label">LCX After</div>
    <img data-src="lcx_after.png" src="lcx_after.png">
  </div>
</div>
</body></html>
