# ═══════════════════════════════════════════════════════════════
#  VRAXION v4 — Central Configuration
#  Single source of truth for all runtime parameters.
#  Sectioned by module: model, data, (training TBD).
# ═══════════════════════════════════════════════════════════════


# ══════════════════════════════════════════════════════════════
#  MODEL — instnct.py
#  Ring + Pointer architecture hyperparameters.
#  All values sweep-validated unless noted.
# ══════════════════════════════════════════════════════════════

model:

  # ── M: Ring Slots ───────────────────────────────────────────
  # Circular buffer size. Slot M wraps to slot 0.
  # This is the total "memory capacity" of the ring.
  # Sweep (2026-02-24, seq=64, 3 tasks): M≥2×seq_len required.
  #   M<seq → ring overwrites → loss degrades 24-46%.
  #   M=256 covers seq≤128. Scale M with seq_len for longer runs.
  # LOCKED — validated across echo, delay_echo, denoise tasks.
  M: 128               # ring_slots — circular buffer size

  # ── D: Legacy Dimension (fallback for hidden_dim + slot_dim) ──
  # Used when hidden_dim/slot_dim are absent. Keep for backward compat.
  D: 132

  # ── hidden_dim: Hidden State Width ────────────────────────
  # Expert "brain" width. Bigger = more capacity for pattern recognition.
  # Independent of ring buffer — can be very large without VRAM cost.
  hidden_dim: 4096

  # ── slot_dim: Ring Slot Width ─────────────────────────────
  # Ring buffer cell width. Smaller = less VRAM (ring gets cloned T×N
  # times during backprop). Experts compress hidden→slot before writing.
  # When slot_dim < hidden_dim, read_proj decompresses, write_proj compresses.
  slot_dim: 128

  # ── N: Beings Count ────────────────────────────────────────
  # Independent agents sharing one ring. Each owns its own
  # pointer, read projection, and jump destinations.
  # Sweep (2026-02-24, D=256, echo, CUDA): N=6 best loss (0.2656),
  #   N=2 close second (0.2708) at 3x speed — good for fast iteration.
  #   Speed linear with N. N>8 no benefit, N=24 degrades.
  # LOCKED — optimal confirmed.
  N: 1                # beings — expert count

  # ── R: Attention Radius ────────────────────────────────────
  # Fixed attention window = 2R+1 slots around pointer.
  # R=0 → 1 slot (needle), R=1 → 3 slots, R=2 → 5 slots.
  # Ablation: R=0 best on tiny XOR, but R=1 better at scale (run 21 A/B).
  R: 1                # attn_radius — window half-width

  # ── Attention Kernel Mode ──────────────────────────────────
  # Shape of the attention window weights around the pointer.
  # 'vshape'   = triangle decay (center=1, linear to 0 at edges) — best positional by geo mean
  # 'gaussian' = Gaussian bell curve centered on pointer
  # 'uniform'  = soft step function (sigmoid-based)
  # 'dotprod'  = content-based attention (query·key softmax) within local window
  # 'topk'     = content-based global search: score ALL M slots, read top K, write to pointer window
  #              Run 35 (2026-03-01): WORSE than vshape by -4.6% — ring content too noisy for search
  kernel_mode: vshape

  # ── TopK Read Slots ──────────────────────────────────────
  # Number of ring slots to attend to when kernel_mode = 'topk'.
  # Higher K = broader search, more context. K=8 covers ~0.8% of M=1024.
  topk_K: 8

  # ── Pointer Movement Mode ──────────────────────────────────
  # How experts move their pointer after each read/write step.
  # 'sequential' = ptr += 1 (deterministic walk, staggered init)
  # 'learned'    = direction head (stay/fwd/back) + magnitude head (step size)
  #                direction: softmax over 3 actions from hidden state
  #                magnitude: bounded [0, M/16] via sigmoid
  #                init bias: defaults to forward +1 behavior
  # 'pilot'      = forward walk (+1) + content-based jump
  #                each slot has a learned identity vector
  #                pulse compares hidden→query to slot identity (cosine sim)
  #                similar → small step, different → big jump forward
  #                step = 1 + max_jump × sigmoid(-sim × tau)
  pointer_mode: sequential
  write_mode: replace            # 'accumulate' (scatter_add) | 'replace' (HDD-style overwrite)
  replace_impl: dense            # 'dense' | 'proxy_overlay' (nightly-only proxy fast path)

  # ── Pilot Pulse Pointer Params ──────────────────────────────
  # When pointer_mode = 'pilot': each ring slot gets a learned identity.
  # The pulse compares to current slot — high sim = stay, low sim = jump.
  pilot_max_jump: 512      # max extra jump distance. Sweep: 128, 256, 512
  pilot_id_dim: 32         # identity vector size per slot

  # ── Gradient Checkpointing ───────────────────────────────────
  # Chunk size for gradient checkpointing in the T×N forward loop.
  # 0 = disabled (keep all activations — fastest, most VRAM).
  # 32 = recommended (recompute chunks of 32 timesteps — ~13× less ring VRAM).
  # Only active during training (torch.is_grad_enabled()=True).
  checkpoint_chunks: 0

  # ── Expert Write Weighting ──────────────────────────────────
  # Gradient-based expert write confidence with 1-frame delay.
  # After backprop, measures write_proj gradient magnitude per expert.
  # Small gradient = expert was close to optimal = higher write weight.
  # false = disabled (equal weights). true = enabled.
  expert_weighting: true

  # ── Embedding Encoding ─────────────────────────────────────
  # Input encoding type for byte tokens (embed_mode: true only).
  # 'learned'  = standard nn.Embedding(256, hidden_dim) — 524K learnable params
  # 'hadamard' = Hadamard matrix rows — 0 params, cosine sim = 0 between ALL tokens
  # 'sincos'   = standard sinusoidal — 0 params, cosine sim ~0.97 between adjacent tokens
  # 'bitlift'  = byte→8 bits→Linear(8, hidden_dim) — 18K learnable params (28× fewer)
  embed_encoding: bitlift

  # ── Output Encoding ─────────────────────────────────────────
  # Output projection type for byte tokens (embed_mode: true only).
  # 'learned'      = standard nn.Linear(hidden_dim, 256) — 524K learnable params
  # 'lowrank_c19'  = Linear(H→64) + c19 + Linear(64→256) — 148K params, +3.7% acc vs learned
  # 'hadamard'     = matmul with Hadamard table.T — 0 params
  # 'sincos'       = matmul with sincos table.T — 0 params
  # 'bitlift'      = Linear(hidden_dim, 8)+tanh → @bit_patterns.T — 16K params (bottleneck)
  output_encoding: lowrank_c19

  # ── Bulletin Board Temporal Cache ────────────────────────────
  # Short-term FIFO cache of recent input vectors (t-1, t-5, t-10).
  # Each expert attends to cached snapshots via soft attention,
  # blended into hidden state through a sample-dependent gate (beta).
  # true = enabled (adds ~397K params). false = disabled (zero cost).
  bb_enabled: false

  # BB gate initial bias — controls starting openness.
  # sigmoid(0.0)=0.50, sigmoid(-2.2)=0.10, sigmoid(-1.0)=0.27
  bb_gate_bias: 0.0

  # BB output scale — multiplier on gated context before adding to hidden.
  # Keeps BB magnitude in line with ring signal (~1-2 norm).
  bb_scale: 0.05

  # BB attention temperature — multiplier on cosine scores before softmax.
  # Higher = softer distribution, more exploration across time taps.
  bb_tau: 4.0

  # BB gate mode: 'learned' = sigmoid gate (sample-dependent), 'fixed' = no gate (scale only)
  bb_gate_mode: fixed


# ══════════════════════════════════════════════════════════════
#  DATA — generate.py
#  Training data generation constants.
#  These are task design choices, not hyperparameters.
# ══════════════════════════════════════════════════════════════

data:

  # ── Block Size ─────────────────────────────────────────────
  # Task pattern granularity — generators structure data in
  # N-byte chunks. The model reads byte-by-byte (not block-by-block).
  # BLOCK sets how long the patterns are that the model must
  # learn to recognise, independent of D.
  block: 16

  # ── Echo Repeat ────────────────────────────────────────────
  # echo task: repeat each random block N times.
  # 7 of 8 consecutive pairs are identical → 87.5% predictable.
  # The 12.5% random transitions keep the model honest.
  echo_repeat: 8

  # ── Delay Gap ──────────────────────────────────────────────
  # delay_echo: number of random filler blocks between original
  # and its echo. gap = 4 × 16 = 64 bytes. When seq_len < gap,
  # the original falls outside the attention window — the model
  # must use ring memory (not just local context) to recall it.
  delay_gap: 4

  # ── Flip Probability ───────────────────────────────────────
  # denoise: probability of flipping each bit in the noisy copy.
  # 10% corruption = enough to destroy naive copy, not so much
  # that the clean signal is unrecoverable.
  flip_prob: 0.1


# ══════════════════════════════════════════════════════════════
#  TRAINING — train.py
#  Training loop parameters. CLI flags override these values.
# ══════════════════════════════════════════════════════════════

training:

  # ── Optimizer ────────────────────────────────────────────────
  # Adam with constant LR. All sweeps converged with 1e-3.
  lr: 1.0e-03             # learning rate
  batch_size: 64        # sequences per step (bumped 32→64→128 — VRAM headroom confirmed)
  seq_len: 256           # bytes per sequence (model sees seq_len timesteps)

  # ── Schedule ─────────────────────────────────────────────────
  steps: 50000          # total training steps
  log_every: 10         # CSV + console log interval (steps)
  save_every: 100       # checkpoint save interval (steps)
  heartbeat_every: 10    # lightweight progress print interval (steps)

  # ── Mode ─────────────────────────────────────────────────────
  # true = byte embedding (256 tokens, CrossEntropy loss)
  # false = binary bits (8-wide float, MSE loss)
  embed_mode: true

  # ── Stability ──────────────────────────────────────────────────
  # Guards that prevent training from blowing up on long runs.
  # All three are safe no-ops at their default/zero values.
  max_grad_norm: 10.0       # gradient clipping threshold (0 = disabled)
  warmup_steps: 100        # linear LR warmup from ~0 to lr, then constant
  patience: 0              # early stopping: save intervals without improvement (0 = disabled)

  # ── Adaptive LR (ReduceLROnPlateau) ─────────────────────────
  lr_schedule: plateau       # 'constant' | 'plateau'
  lr_patience: 200           # steps without improvement -> reduce LR
  lr_factor: 0.99            # LR multiplier on plateau (0.99 = gentle -1% decay)
  lr_min: 1.0e-05            # minimum LR floor

  # ── Paths ────────────────────────────────────────────────────
  # Relative paths resolve from v4/ root. Absolute paths used as-is.
  data_dir: training_data        # .traindat + .mask source
  out_dir: training_output       # checkpoints + logs go here

  # ── Device ─────────────────────────────────────────────────
  # 'auto' = GPU if available, else CPU.  'cpu' / 'cuda' = force.
  # CLI --device flag overrides this value.
  device: cuda

  # ── CPU Threads ────────────────────────────────────────────
  # Number of CPU threads for PyTorch (torch.set_num_threads).
  # Only applies when device = cpu. 0 = PyTorch default (all cores).
  cpu_threads: 20

  # ── Mixed Precision (AMP) ──────────────────────────────────
  # fp16 mixed precision via torch.amp. Halves VRAM for activations,
  # speeds up matmuls on Tensor Cores. Model weights stay fp32.
  # Only effective on CUDA. Checkpoint-compatible (scaler state saved).
  use_amp: true

  # ── torch.compile ─────────────────────────────────────────────
  # Chunk-level compilation: Dynamo traces _process_chunk once (C timesteps),
  # replays the graph for each chunk of the sequence. Avoids full-sequence
  # unroll that hangs at T>=128. Requires bb_enabled=false, _diag_enabled=false.
  compile: true
  compile_chunk_size: 32  # timesteps per compiled chunk (must be > 0)

  # ── Sequential / Stateful Training (TBPTT) ─────────────────
  # When true: data is read in order (not random offsets), and
  # ring/hidden/pointer state persists across sequences. Gradients
  # truncate at each sequence boundary (automatic TBPTT).
  # This lets the model "remember" across short sequences without
  # needing long seq_len — seq_len only controls gradient depth.
  # When false (default): random offsets, fresh state each batch.
  sequential: true

  # ── Deterministic Resume / Eval ──────────────────────────────
  # Checkpoint V2 defaults:
  # - deterministic_resume=true: restore RNG/dataset state from checkpoint
  # - hot_reload_enabled=false: disabled to avoid mid-run config drift
  # - eval_seed: fixed seed for reproducible eval sampling
  deterministic_resume: true
  hot_reload_enabled: false
  eval_seed: 1337

  # Optional global seeds (fresh runs only; resume restores from checkpoint).
  seed: 1337
  dataset_seed: 1337

  # If true, resume hard-fails when data manifest differs from checkpoint.
  # If false, warning only.
  manifest_strict: false


# ══════════════════════════════════════════════════════════════
#  DERIVED (computed, not configurable)
# ══════════════════════════════════════════════════════════════

# φ Jump Destinations:
#   dest(n, slot) = (slot + int(M·0.618) + n) % M
#   0.618 = 1/φ — golden ratio inverse, maximally irrational spacing.
#   Each being gets unique offset (+n) → no collisions.

# Runtime State (per forward pass):
#   ring:    Tensor [B, M, slot_dim]    — the synaptic ring
#   hidden:  Tensor [N, B, hidden_dim]  — hidden state per being
#   pointer: Tensor [N, B]              — pointer positions (float ∈ [0,M))
