<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vraxion &middot; Brain Replay</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="replay" data-page="brain-replay">
  <header class="hdr">
    <a class="back" href="./">&larr; Tasks</a>
    <h1 id="task-title">loading&hellip;</h1>
    <span id="task-stats" class="muted"></span>
  </header>

  <div id="error-slot"></div>

  <main class="two-pane">
    <section class="pane-graph">
      <h2>Network Topology</h2>
      <svg id="graph"
           viewBox="0 0 900 520"
           preserveAspectRatio="xMidYMid meet"
           role="img"
           aria-label="Grown neuron network topology"></svg>
    </section>

    <section class="pane-chart">
      <h2>Validation Accuracy Trajectory</h2>
      <svg id="chart"
           viewBox="0 0 520 320"
           preserveAspectRatio="xMidYMid meet"
           role="img"
           aria-label="Validation accuracy per event"></svg>
    </section>
  </main>

  <section class="transport" aria-label="Replay transport controls">
    <button id="btn-first" title="Jump to start" aria-label="Jump to start">&#x23EE;</button>
    <button id="btn-back" title="Step back" aria-label="Step back">&#x23EA;</button>
    <button id="btn-play" title="Play / pause" aria-label="Play or pause">&#x25B6;</button>
    <button id="btn-fwd" title="Step forward" aria-label="Step forward">&#x23E9;</button>
    <button id="btn-last" title="Jump to end" aria-label="Jump to end">&#x23ED;</button>
    <label>speed
      <select id="speed" aria-label="Playback speed">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
      </select>
    </label>
    <input type="range" id="scrub" min="0" max="0" value="0" step="1" aria-label="Scrub to event">
    <span id="step-count" class="muted">0 / 0</span>
  </section>

  <section class="log-pane">
    <h2>Event log</h2>
    <pre id="log"><span class="log-empty">no events loaded</span></pre>
  </section>

  <script src="./brain_replay.js"></script>
  <script>
    // Replay page entrypoint — calls into brain_replay.js IIFE namespace.
    document.addEventListener('DOMContentLoaded', function () {
      if (window.BrainReplay && typeof window.BrainReplay.init === 'function') {
        window.BrainReplay.init();
      }
    });
  </script>
</body>
</html>
