schema_version: AlphaWeavePressureCell-v1
cell_id: aw_medieval_gate_seal_000002
cell_rank_seed: SilverCell
cell_family: medieval_evidence_conflict
data_origin: human_seeded
human_author: Daniel
assistant_author: ChatGPT
review_status: draft_reviewed
language_mode: hu_primary_en_optional

long_context:
  hu: >
    Egy határvidéki bárói vár körüli politikai feszültségről beszéltünk.
    Lord Merovan beteg, ezért a vár napi döntéseit ideiglenesen a várnagy,
    Ser Halbrecht intézi. A környéken fosztogatók járnak, és több szomszédos
    nemesi ház is próbálhat előnyt szerezni a lord gyengeségéből. A játékosok
    egy karavánt kísérnek a várhoz, amikor egy lovas sürgős pecsétes parancsot
    hoz: a keleti kaput ki kell nyitni egy erdő felől közeledő fegyveres
    csapatnak. A helyzet szürke zónás: a pecsét hasonlít a lord címerére, de
    több részlete nem illik a korábban rögzített hitelesítési szabályhoz.
  en: >
    A borderland baronial castle is under political pressure. Lord Merovan is
    ill, so Ser Halbrecht, the castellan, handles daily decisions. Raiders and
    rival houses may exploit the lord's weakness. A rider arrives with a sealed
    urgent order to open the eastern gate for armed men approaching from the
    forest. The seal resembles the lord's crest, but several details conflict
    with the known authentication protocol.

short_context_focus:
  hu: >
    A kapuőrök azt kérdezik: beengedjék-e a közeledő fegyvereseket a várba a
    hozott pecsétes parancs alapján?
  en: >
    The gate guards ask whether they should admit the approaching armed group
    based on the sealed order.

options:
  A:
    hu: Nyissák ki a kaput, mert a lovasnál pecsétes parancs van.
    en: Open the gate because the rider has a sealed order.
  B:
    hu: Ne nyissák ki a kaput, és állítsák biztosan, hogy az üzenet hamis.
    en: Do not open the gate, and state with certainty that the message is forged.
  C:
    hu: >
      Ne nyissák ki a kaput egyelőre. Tartsák zárva, kérjenek második
      hitelesítést Ser Halbrechttől vagy Lord Merovan belső embereitől, és
      figyeljék tovább a közeledő csapatot.
    en: >
      Do not open the gate yet. Keep it closed, request secondary authentication
      from Ser Halbrecht or Lord Merovan's inner staff, and keep observing the
      approaching group.
  D:
    hu: Fogják el azonnal a lovast árulásért, mert a pecsét nem felel meg a szabálynak.
    en: Arrest the rider immediately for treason because the seal does not match the rule.
  E:
    hu: Engedjék be csak a lovast, de a közeledő csapatot ne, amíg nincs hitelesítés.
    en: Admit only the rider, but not the approaching armed group, until authentication is obtained.

public_input:
  context: >
    Egy határvidéki vár kapujánál sürgős pecsétes parancs érkezik. A kapuőrök
    csak a látható bizonyítékok és a korábban ismert kapuprotokoll alapján
    dönthetnek. / At a borderland castle gate, an urgent sealed order arrives.
    The guards may decide only from visible evidence and the known gate protocol.

  observations:
    - obs_id: obs_A
      order: 1
      source_id: ser_halbrecht_gate_order
      source_class: standing_security_protocol
      trust: verified
      text_hu: >
        Ser Halbrecht tegnap este kiadott egy kapuőr-parancsot: Lord Merovan
        pecsétjével ellátott sürgős üzenetet csak akkor szabad végrehajtani,
        ha a pecsét mellett a lila viaszban látható a belső gyűrű három apró
        bevágása is.
      text_en: >
        Ser Halbrecht issued a gate order last night: an urgent message bearing
        Lord Merovan's seal may be executed only if the seal is in purple wax
        and the inner ring shows three small cut marks.

    - obs_id: obs_B
      order: 2
      source_id: courier_scroll
      source_class: presented_order
      trust: unverified
      text_hu: >
        A lovas egy tekercset mutat. Rajta Merovan hollós címere látható vörös
        viaszban. A szöveg szerint: Nyissátok meg a keleti kaput a fenyves
        felől érkező szövetséges csapatnak. A parancs sürgős.
      text_en: >
        The rider shows a scroll. It bears Merovan's raven crest in red wax.
        The text says: Open the eastern gate for the allied force coming from
        the pinewood. The order is urgent.

    - obs_id: obs_C
      order: 3
      source_id: elder_gate_guard
      source_class: trained_guard_inspection
      trust: verified_local_inspection
      text_hu: >
        Az egyik idős kapuőr észreveszi, hogy a pecsét vörös viaszban van, nem
        lilában. A hollós minta hasonlít Merovan jelére, de a három apró belső
        bevágás nem látszik.
      text_en: >
        An elder gate guard notices that the seal is in red wax, not purple.
        The raven pattern resembles Merovan's sign, but the three small inner
        cut marks are not visible.

    - obs_id: obs_D
      order: 4
      source_id: stable_boy
      source_class: casual_witness
      trust: weak
      text_hu: >
        Egy istállófiú azt mondja: Szerintem a lovas Merovan embere lehet,
        mert drága nyerge van.
      text_en: >
        A stable boy says: I think the rider may be Merovan's man because he has
        an expensive saddle.

    - obs_id: obs_E
      order: 5
      source_id: tower_watch
      source_class: visual_observation
      trust: verified_partial
      text_hu: >
        A toronyból látni, hogy tényleg közeledik egy kisebb fegyveres csapat
        az erdő felől. A zászlójuk sötét, részletei nem kivehetők.
      text_en: >
        From the tower, a small armed group is indeed seen approaching from the
        forest. Their banner is dark, and details are not distinguishable.

  query_hu: >
    Beengedjék-e a közeledő fegyvereseket a várba a hozott pecsétes parancs alapján?
  query_en: >
    Should the approaching armed group be admitted into the castle based on the sealed order?

player_solution:
  author: Daniel
  raw_hu: >
    Nekem is ugyanaz a fura, hogy nem illik a szín lila és a kaparásnyom, szóval
    elutasítva, valószínű hamisítás vagy behatolási kísérlet, riasztás és
    elfogatni azokat akik be akartak jutni és kikérdezni és magas szintre
    emelni a riasztást just in case.
  normalized_hu: >
    Ne nyissák ki a kaput. A pecsét nem felel meg a hitelesítési szabálynak:
    rossz a viaszszín és hiányoznak a belső bevágások. Ez erős gyanú hamisításra
    vagy beszivárgási kísérletre, de még nem végleges bizonyíték arra, hogy a
    lovas biztosan áruló. A helyes lépés: kapu zárva, riasztás emelése, a lovas
    kontrollált őrizetbe vétele vagy kihallgatása, Ser Halbrecht vagy Lord
    Merovan belső embereinek azonnali hitelesítése, és a közeledő fegyveres
    csapat távol tartása, amíg nincs megerősítés.
  normalized_action: DEFER_AND_ESCALATE

ai_solution:
  action: DEFER_AND_ESCALATE
  answer_hu: >
    Ne nyissák ki a kaput a közeledő fegyvereseknek. A parancs protokoll szerint
    nem hitelesíthető, ezért magas kockázatúként kell kezelni. Kérjenek második
    hitelesítést Ser Halbrechttől vagy Lord Merovan belső embereitől, emeljék a
    riasztási szintet, a lovast tartsák ellenőrzött őrizetben vagy hallgassák ki,
    és a fegyveres csapatot tartsák kívül.
  answer_en: >
    Do not open the gate for the approaching armed group. The order cannot be
    authenticated under the protocol and must be treated as high risk. Request
    secondary authentication from Ser Halbrecht or Lord Merovan's inner staff,
    raise alert level, hold or question the rider under control, and keep the
    armed group outside.
  audit_reasoning:
    - The standing protocol is verified and requires purple wax plus three inner cut marks.
    - The presented seal has the raven crest but uses red wax and lacks the required cut marks.
    - This does not prove absolute forgery, but it proves the order is not protocol-authenticated.
    - The stable boy's expensive-saddle clue is weak and not decisive.
    - The approaching armed group is real, but its allegiance is unidentified.
    - Opening the gate would be an unsupported and unsafe commit.
    - Condemning the courier as certainly guilty would also overclaim beyond the evidence.
    - The correct move is to defer entry, escalate security, and request authentication.

hidden_oracle:
  oracle_status: decision_oracle_only
  expected_action: DEFER_AND_ESCALATE
  expected_answer_hu: >
    Ne nyissák ki a kaput. Kezeljék a parancsot nem hitelesített, magas kockázatú
    utasításként. Kérjenek második hitelesítést, emeljék a riasztást, a lovast
    biztonságosan tartsák vagy kérdezzék ki, és a fegyveres csapatot tartsák
    kívül, amíg nincs megerősítés.
  expected_answer_en: >
    Do not open the gate. Treat the order as unauthenticated and high risk.
    Request secondary authentication, raise alert, hold or question the rider
    safely, and keep the armed group outside until verified.
  accepted_player_reasoning:
    - notices mismatch between required purple wax and actual red wax
    - notices missing inner cut marks
    - rejects weak appearance evidence as decisive
    - treats approaching armed group as real but unidentified
    - raises security posture
    - avoids opening the gate
  minor_correction:
    - probable forgery is acceptable
    - confirmed forgery is too strong without further evidence
    - controlled detention/questioning is acceptable if lawful and safe
    - instant conviction or execution is not supported
  required_citation:
    - obs_A
    - obs_C
    - obs_E
  supporting_but_weak:
    - obs_D
  required_trace:
    - obs_A defines authentication protocol
    - obs_C shows the presented seal fails that protocol
    - obs_D is weak and cannot authenticate the rider
    - obs_E confirms an armed group is approaching but does not identify it as allied
    - conclude DEFER_AND_ESCALATE rather than ANSWER_OPEN_GATE or CONFIRMED_FORGERY
  forbidden_behavior:
    - open the gate
    - treat expensive saddle as proof of loyalty
    - call the approaching armed group allied as a committed fact
    - state confirmed forgery without further evidence
    - execute or condemn the courier without verification
    - ignore the seal protocol mismatch
    - perform full-library scan

cell_pack_variants:
  - variant_id: valid_purple_seal_with_marks
    description: The courier's seal matches the protocol.
    mutation:
      replace_obs_B_and_obs_C: >
        The scroll bears Merovan's raven crest in purple wax, and the elder guard
        confirms that the three inner cut marks are visible.
    expected_action: ANSWER_WITH_SECURITY_CAUTION
    expected_answer_hu: >
      A parancs protokoll szerint hitelesnek tűnik, de a fegyveres csapatot
      továbbra is rendezett, ellenőrzött beléptetéssel kell kezelni.

  - variant_id: missing_protocol_memory
    description: No verified protocol is available.
    mutation:
      remove_observation: obs_A
    expected_action: ASK_FOR_EVIDENCE
    expected_answer_hu: >
      Kérjenek hiteles kapuprotokollt vagy belső megerősítést, mielőtt kaput nyitnak.

  - variant_id: weak_guard_inspection_only
    description: The mismatch is reported only by a weak/untrained source.
    mutation:
      set_observation_trust:
        obs_C: weak
    expected_action: DEFER
    expected_answer_hu: >
      Ne nyissanak kaput pusztán gyenge eltérésjelzés alapján; kérjenek képzett
      ellenőrzést vagy második hitelesítést.

  - variant_id: confirmed_forgery_by_halbrecht
    description: Ser Halbrecht directly confirms the seal format is impossible.
    add_observation:
      obs_id: obs_F
      order: 6
      source_id: ser_halbrecht_direct
      source_class: command_authority
      trust: verified
      text_hu: >
        Ser Halbrecht üzeni: ilyen vörös viaszú sürgős parancsot nem adtam ki;
        a belső bevágások hiánya hamisításra utal.
    expected_action: REJECT_AND_DETAIN
    expected_answer_hu: >
      A parancsot utasítsák el, a lovast tartsák őrizetben kihallgatásra, a
      csapatot ne engedjék be.

  - variant_id: negative_scope_tavern_story
    description: Same motifs appear inside a tavern tale, not active gate evidence.
    public_input:
      context: >
        Egy bárd egy régi történetet mesél egy hamis vörös pecsétről és egy
        ostromlott várról. Ez nem a jelenlegi várkapu élő helyzete.
      observations:
        - obs_id: story_1
          order: 1
          source_id: bard_tale
          source_class: narrative
          trust: non_evidence
          text_hu: >
            A történetben a vörös viaszú pecsét hamis volt, és a kapuőrök nem
            engedték be az idegeneket.
      query_hu: Mi a történet tanulsága?
    expected_action: NO_CALL
    expected_answer_hu: null
    forbidden_behavior:
      - commit active castle security status
      - activate live seal verification route
      - treat the bard tale as current evidence

route_budget:
