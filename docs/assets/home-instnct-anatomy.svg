<svg width="760" height="236" viewBox="0 0 760 236" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelFill" x1="32" y1="48" x2="728" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1730" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#12355F" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="centerFill" x1="280" y1="38" x2="480" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173D8D"/>
      <stop offset="0.55" stop-color="#1E57D7"/>
      <stop offset="1" stop-color="#20D2FF"/>
    </linearGradient>
    <linearGradient id="arrowStroke" x1="200" y1="118" x2="560" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#79EAFF" stop-opacity="0.58"/>
      <stop offset="0.55" stop-color="#2F88FF" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#F1FDFF" stop-opacity="0.54"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 118) rotate(90) scale(58 58)">
      <stop offset="0" stop-color="#FFF2C8"/>
      <stop offset="0.26" stop-color="#FFE5B8" stop-opacity="0.86"/>
      <stop offset="0.58" stop-color="#76E6FF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#76E6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 118) rotate(90) scale(90 90)">
      <stop offset="0" stop-color="#78EAFF" stop-opacity="0.14"/>
      <stop offset="0.65" stop-color="#2F88FF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#2F88FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#04111E" flood-opacity="0.32"/>
    </filter>
    <style>
      .sideLabel {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.008em;
        fill: #F8FCFF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .sideSub {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 10.2px;
        font-weight: 600;
        letter-spacing: 0.018em;
        fill: #9DEFFF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .centerLabel {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0.012em;
        fill: #FBFEFF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .centerSub {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 11.2px;
        font-weight: 600;
        letter-spacing: 0.022em;
        fill: #B5F6FF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .dot {
        fill: #88EDFF;
        opacity: 0.74;
      }
      .edge {
        stroke: #B5FCFF;
        stroke-opacity: 0.34;
      }
    </style>
  </defs>

  <g opacity="0.88">
    <path d="M208 118H280" stroke="url(#arrowStroke)" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M480 118H552" stroke="url(#arrowStroke)" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M276 118L267 112" stroke="url(#arrowStroke)" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M276 118L267 124" stroke="url(#arrowStroke)" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M548 118L539 112" stroke="url(#arrowStroke)" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M548 118L539 124" stroke="url(#arrowStroke)" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <g opacity="0.94">
    <circle cx="380" cy="118" r="74" fill="url(#haloGlow)" filter="url(#softGlow)"/>
    <circle cx="380" cy="118" r="34" fill="url(#coreGlow)"/>
    <path d="M342 91C354 79 372 73 390 74C406 75 421 82 432 94" stroke="#8CEEFF" stroke-opacity="0.28" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M343 144C355 154 373 159 390 158C405 157 419 151 430 141" stroke="#2F88FF" stroke-opacity="0.30" stroke-width="1.4" stroke-linecap="round"/>
    <circle class="dot" cx="341" cy="83" r="2.8"/>
    <circle class="dot" cx="422" cy="79" r="2.6"/>
    <circle class="dot" cx="436" cy="147" r="2.4"/>
    <circle class="dot" cx="348" cy="153" r="2.3"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="32" y="64" width="176" height="108" rx="26" fill="url(#panelFill)" class="edge"/>
    <rect x="280" y="40" width="200" height="156" rx="32" fill="url(#centerFill)" stroke="#C1FCFF" stroke-opacity="0.58"/>
    <rect x="552" y="64" width="176" height="108" rx="26" fill="url(#panelFill)" class="edge"/>
  </g>

  <g id="io-projections" data-label="Passive I/O Projections" data-role="input and output edges">
    <title>Passive I/O Projections</title>
    <text class="sideLabel" x="120" y="100">
      <tspan x="120" dy="0">Passive I/O</tspan>
      <tspan x="120" dy="20">Projections</tspan>
    </text>
    <text class="sideSub" x="120" y="146">input and output edges</text>
  </g>

  <g id="hidden-graph" data-label="Self-Wiring Hidden Graph" data-role="persistent internal state">
    <title>Self-Wiring Hidden Graph</title>
    <text class="centerLabel" x="380" y="98">
      <tspan x="380" dy="0">Self-Wiring</tspan>
      <tspan x="380" dy="24">Hidden Graph</tspan>
    </text>
    <text class="centerSub" x="380" y="153">persistent internal state</text>
    <circle cx="322" cy="118" r="3.6" fill="#F8FCFF"/>
    <circle cx="346" cy="92" r="3.8" fill="#77E7FF"/>
    <circle cx="350" cy="145" r="3.2" fill="#2F88FF"/>
    <circle cx="412" cy="90" r="3.7" fill="#F8FCFF"/>
    <circle cx="438" cy="118" r="4.0" fill="#77E7FF"/>
    <circle cx="414" cy="145" r="3.4" fill="#F8FCFF"/>
  </g>

  <g id="training-method" data-label="Mutation-Selection Training" data-role="not fixed-graph backprop">
    <title>Mutation-Selection Training</title>
    <text class="sideLabel" x="640" y="100">
      <tspan x="640" dy="0">Mutation-Selection</tspan>
      <tspan x="640" dy="20">Training</tspan>
    </text>
    <text class="sideSub" x="640" y="146">not fixed-graph backprop</text>
  </g>
</svg>
