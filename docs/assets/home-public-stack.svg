<svg width="760" height="440" viewBox="0 0 760 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="connectorStroke" x1="116" y1="76" x2="652" y2="366" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7BEAFF" stop-opacity="0.58"/>
      <stop offset="0.5" stop-color="#2F88FF" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#F4FDFF" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="homeFill" x1="292" y1="180" x2="468" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#163D8A"/>
      <stop offset="0.56" stop-color="#1E57D4"/>
      <stop offset="1" stop-color="#20CFFF"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="56" y1="56" x2="704" y2="382" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1730" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#12345F" stop-opacity="0.96"/>
    </linearGradient>
    <radialGradient id="homeCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 220) rotate(90) scale(72 72)">
      <stop offset="0" stop-color="#FFF2CC"/>
      <stop offset="0.26" stop-color="#FFE6BA" stop-opacity="0.9"/>
      <stop offset="0.58" stop-color="#6EDCFF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#6EDCFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="homeHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 220) rotate(90) scale(116 116)">
      <stop offset="0" stop-color="#74E8FF" stop-opacity="0.16"/>
      <stop offset="0.62" stop-color="#2F88FF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#2F88FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowSoft" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#04111E" flood-opacity="0.34"/>
    </filter>
    <style>
      .connector {
        stroke: url(#connectorStroke);
        stroke-width: 2.2;
        stroke-linecap: round;
        fill: none;
      }
      .nodeTitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.01em;
        fill: #F7FCFF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .homeTitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: 0.015em;
        fill: #FBFEFF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .nodeRole {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.035em;
        fill: #9CEEFF;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .dot {
        fill: #8CEEFF;
        opacity: 0.72;
      }
    </style>
  </defs>

  <g opacity="0.9">
    <path class="connector" d="M282 94C302 114 316 138 336 180"/>
    <path class="connector" d="M478 94C458 114 444 138 424 180"/>
    <path class="connector" d="M286 344C308 326 322 304 340 260"/>
    <path class="connector" d="M476 344C454 326 440 304 420 260"/>
  </g>

  <g opacity="0.94">
    <circle cx="380" cy="220" r="96" fill="url(#homeHalo)" filter="url(#glowSoft)"/>
    <circle cx="380" cy="220" r="50" fill="url(#homeCore)"/>
    <path d="M324 198C341 170 374 156 407 160C430 163 452 176 464 196" stroke="#8CEEFF" stroke-opacity="0.34" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M330 248C351 272 388 281 419 273C440 268 456 256 467 236" stroke="#2F88FF" stroke-opacity="0.34" stroke-width="1.6" stroke-linecap="round"/>
    <circle class="dot" cx="321" cy="183" r="3.4"/>
    <circle class="dot" cx="438" cy="170" r="3.2"/>
    <circle class="dot" cx="458" cy="249" r="3.1"/>
    <circle class="dot" cx="340" cy="267" r="2.8"/>
  </g>

  <g filter="url(#nodeShadow)">
    <rect x="292" y="180" width="176" height="80" rx="30" fill="url(#homeFill)" stroke="#C1FCFF" stroke-opacity="0.62"/>
    <rect x="70" y="56" width="212" height="76" rx="26" fill="url(#nodeFill)" stroke="#72EDFF" stroke-opacity="0.34"/>
    <rect x="478" y="56" width="212" height="76" rx="26" fill="url(#nodeFill)" stroke="#72EDFF" stroke-opacity="0.34"/>
    <rect x="56" y="306" width="230" height="76" rx="26" fill="url(#nodeFill)" stroke="#72EDFF" stroke-opacity="0.34"/>
    <rect x="474" y="306" width="230" height="76" rx="26" fill="url(#nodeFill)" stroke="#72EDFF" stroke-opacity="0.34"/>
  </g>

  <g id="node-home" data-page="VRAXION Home" data-role="orientation hub">
    <title>VRAXION Home</title>
    <text class="homeTitle" x="380" y="212">VRAXION Home</text>
    <text class="nodeRole" x="380" y="236">orientation hub</text>
  </g>

  <g id="node-timeline" data-page="Project Timeline" data-role="changes and terms">
    <title>Project Timeline</title>
    <text class="nodeTitle" x="176" y="89">Project Timeline</text>
    <text class="nodeRole" x="176" y="114">changes and terms</text>
  </g>

  <g id="node-architecture" data-page="INSTNCT Architecture" data-role="active technical line">
    <title>INSTNCT Architecture</title>
    <text class="nodeTitle" x="584" y="89">INSTNCT Architecture</text>
    <text class="nodeRole" x="584" y="114">active technical line</text>
  </g>

  <g id="node-engineering" data-page="Engineering Protocol" data-role="run contract">
    <title>Engineering Protocol</title>
    <text class="nodeTitle" x="171" y="339">Engineering Protocol</text>
    <text class="nodeRole" x="171" y="364">run contract</text>
  </g>

  <g id="node-findings" data-page="Validated Findings" data-role="evidence board">
    <title>Validated Findings</title>
    <text class="nodeTitle" x="589" y="339">Validated Findings</text>
    <text class="nodeRole" x="589" y="364">evidence board</text>
  </g>

  <g opacity="0.5">
    <circle class="dot" cx="136" cy="148" r="2.9"/>
    <circle class="dot" cx="622" cy="150" r="2.9"/>
    <circle class="dot" cx="134" cy="292" r="2.6"/>
    <circle class="dot" cx="621" cy="292" r="2.6"/>
  </g>
</svg>
