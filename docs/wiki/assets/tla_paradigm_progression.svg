<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" width="760" height="560">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 17px; font-weight: 600; fill: #c9d1d9; }
    .subtitle { font-size: 12px; fill: #8b949e; }
    .row { font-size: 12px; fill: #c9d1d9; }
    .date { font-size: 11px; fill: #8b949e; }
    .value { font-size: 11px; font-weight: 700; fill: #c9d1d9; }
    .win { fill: #39d353; }
    .partial { fill: #58a6ff; }
    .weak { fill: #d29922; }
    .fail { fill: #ff7b72; }
    .gridline { stroke: #30363d; stroke-width: 1; }
  </style>

  <!-- Title -->
  <text x="380" y="26" class="title" text-anchor="middle">Paradigm progression — held-out generalization solve rate</text>
  <text x="380" y="46" class="subtitle" text-anchor="middle">From 0/any (all-at-once search) to 250/250 (C19 + float gradient) in 2 days</text>

  <!-- Gridlines 0%, 25%, 50%, 75%, 100% -->
  <!-- Bars start at x=340, end at x=720. Range = 380px -->
  <line x1="340" y1="70" x2="340" y2="520" class="gridline"/>
  <line x1="435" y1="70" x2="435" y2="520" class="gridline"/>
  <line x1="530" y1="70" x2="530" y2="520" class="gridline"/>
  <line x1="625" y1="70" x2="625" y2="520" class="gridline"/>
  <line x1="720" y1="70" x2="720" y2="520" class="gridline"/>
  <text x="340" y="62" class="subtitle" text-anchor="middle">0%</text>
  <text x="435" y="62" class="subtitle" text-anchor="middle">25%</text>
  <text x="530" y="62" class="subtitle" text-anchor="middle">50%</text>
  <text x="625" y="62" class="subtitle" text-anchor="middle">75%</text>
  <text x="720" y="62" class="subtitle" text-anchor="middle">100%</text>

  <!-- 12 rows. Row height 34, bar height 20, start y=78 -->

  <!-- Row 1: 04-08  All-at-once 256 nn  0 / any -->
  <text x="20" y="92" class="date">04-08</text>
  <text x="60" y="92" class="row">All-at-once search, 256n</text>
  <rect x="340" y="80" width="2" height="20" class="fail"/>
  <text x="350" y="95" class="value">0 / any</text>

  <!-- Row 2: 04-08  Incremental 10 nn  1/1 (100%) -->
  <text x="20" y="126" class="date">04-08</text>
  <text x="60" y="126" class="row">Incremental build, 10n (ADD)</text>
  <rect x="340" y="114" width="380" height="20" class="win"/>
  <text x="730" y="129" class="value" text-anchor="start">1 / 1</text>

  <!-- Row 3: 04-09  Readout fix holographic 7/10 = 70% -->
  <text x="20" y="160" class="date">04-09</text>
  <text x="60" y="160" class="row">Readout fix + holographic</text>
  <rect x="340" y="148" width="266" height="20" class="partial"/>
  <text x="616" y="163" class="value" text-anchor="start">7 / 10</text>

  <!-- Row 4: 04-09 Float gradient + per-neuron bias 8/8 = 100% -->
  <text x="20" y="194" class="date">04-09</text>
  <text x="60" y="194" class="row">Float gradient + per-neuron bias</text>
  <rect x="340" y="182" width="380" height="20" class="win"/>
  <text x="730" y="197" class="value" text-anchor="start">8 / 8</text>

  <!-- Row 5: 04-10 Float gradient 200 seeds ADD 200/200 = 100% -->
  <text x="20" y="228" class="date">04-10</text>
  <text x="60" y="228" class="row">Float grad 200 seeds (ADD)</text>
  <rect x="340" y="216" width="380" height="20" class="win"/>
  <text x="730" y="231" class="value" text-anchor="start">200 / 200</text>

  <!-- Row 6: 04-10 Float gradient 200 seeds |a-b| 199/200 = 99.5% -->
  <text x="20" y="262" class="date">04-10</text>
  <text x="60" y="262" class="row">Float grad 200 seeds (|a-b|)</text>
  <rect x="340" y="250" width="378.1" height="20" class="win"/>
  <text x="728" y="265" class="value" text-anchor="start">199 / 200</text>

  <!-- Row 7: 04-10 Float gradient 200 seeds MUL 158/200 = 79% -->
  <text x="20" y="296" class="date">04-10</text>
  <text x="60" y="296" class="row">Float grad 200 seeds (MUL)</text>
  <rect x="340" y="284" width="300.2" height="20" class="partial"/>
  <text x="650" y="299" class="value" text-anchor="start">158 / 200</text>

  <!-- Row 8: 04-10 C19 + 50 seeds x 5 tasks 250/250 = 100% -->
  <text x="20" y="330" class="date">04-10</text>
  <text x="60" y="330" class="row">C19 + 50 seeds x 5 tasks</text>
  <rect x="340" y="318" width="380" height="20" class="win"/>
  <text x="730" y="333" class="value" text-anchor="start">250 / 250</text>

  <!-- Row 9: 04-10 ReLU + 50 seeds x 5 tasks 189/250 = 75.6% -->
  <text x="20" y="364" class="date">04-10</text>
  <text x="60" y="364" class="row">ReLU + 50 seeds x 5 tasks</text>
  <rect x="340" y="352" width="287.3" height="20" class="partial"/>
  <text x="637" y="367" class="value" text-anchor="start">189 / 250</text>

  <!-- Row 10: 04-10 Binary C19 exhaustive 3/5 = 60% -->
  <text x="20" y="398" class="date">04-10</text>
  <text x="60" y="398" class="row">Binary +/-1 + C19 exhaustive</text>
  <rect x="340" y="386" width="228" height="20" class="weak"/>
  <text x="578" y="401" class="value" text-anchor="start">3 / 5</text>

  <!-- Row 11: 04-10 Binary ReLU exhaustive 0/5 -->
  <text x="20" y="432" class="date">04-10</text>
  <text x="60" y="432" class="row">Binary +/-1 + ReLU exhaustive</text>
  <rect x="340" y="420" width="2" height="20" class="fail"/>
  <text x="350" y="435" class="value">0 / 5</text>

  <!-- Row 12: 04-10 Fraction extraction 5/5 = 100% -->
  <text x="20" y="466" class="date">04-10</text>
  <text x="60" y="466" class="row">Fraction extraction to integer</text>
  <rect x="340" y="454" width="380" height="20" class="win"/>
  <text x="730" y="469" class="value" text-anchor="start">5 / 5</text>

  <!-- Legend -->
  <rect x="60" y="498" width="14" height="12" class="win"/>
  <text x="80" y="508" class="row">&#8805;95%</text>
  <rect x="150" y="498" width="14" height="12" class="partial"/>
  <text x="170" y="508" class="row">70-94%</text>
  <rect x="240" y="498" width="14" height="12" class="weak"/>
  <text x="260" y="508" class="row">30-69%</text>
  <rect x="330" y="498" width="14" height="12" class="fail"/>
  <text x="350" y="508" class="row">0-29%</text>

  <text x="380" y="540" class="subtitle" text-anchor="middle">Two days, eleven paradigm steps — from 0% to 100% on held-out arithmetic generalization</text>
</svg>
