<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .title { font-size: 17px; font-weight: 600; fill: #c9d1d9; }
    .subtitle { font-size: 12px; fill: #8b949e; }
    .axis { font-size: 12px; fill: #8b949e; }
    .label { font-size: 12px; fill: #c9d1d9; }
    .labelbold { font-size: 13px; font-weight: 600; fill: #c9d1d9; }
    .value { font-size: 11px; font-weight: 600; fill: #c9d1d9; }
    .withedges { fill: #39d353; }
    .noedges { fill: #8b949e; }
    .baseline { stroke: #d29922; stroke-width: 1; stroke-dasharray: 4,4; }
    .gridline { stroke: #30363d; stroke-width: 1; }
  </style>

  <!-- Title -->
  <text x="360" y="26" class="title" text-anchor="middle">Edges matter for addition — INSTNCT vs ListNet</text>
  <text x="360" y="46" class="subtitle" text-anchor="middle">a+b in 0-4 (25 examples)   |   random baseline = 11.1%   |   Deltas: INSTNCT +52-56pp, ListNet +20-40pp</text>

  <!-- Chart area x=140-680, y=70-310. 0-70% accuracy -->
  <!-- 240 px tall, 1% = 3.428 px -->

  <line x1="140" y1="70" x2="680" y2="70" class="gridline"/>
  <line x1="140" y1="130" x2="680" y2="130" class="gridline"/>
  <line x1="140" y1="190" x2="680" y2="190" class="gridline"/>
  <line x1="140" y1="250" x2="680" y2="250" class="gridline"/>
  <line x1="140" y1="310" x2="680" y2="310" stroke="#484f58"/>

  <text x="132" y="74" class="axis" text-anchor="end">70%</text>
  <text x="132" y="134" class="axis" text-anchor="end">52%</text>
  <text x="132" y="194" class="axis" text-anchor="end">35%</text>
  <text x="132" y="254" class="axis" text-anchor="end">17%</text>
  <text x="132" y="314" class="axis" text-anchor="end">0%</text>

  <!-- Random baseline at 11.1% -> y = 310 - 11.1*3.428 = 310 - 38.05 = 271.95 -->
  <line x1="140" y1="271.95" x2="680" y2="271.95" class="baseline"/>
  <text x="685" y="275" class="axis" text-anchor="start">random 11.1%</text>

  <!-- 2 groups. Group 1 (INSTNCT) at x=180, group 2 (ListNet) at x=430 -->
  <!-- Each group has: with-edges bar (range 56-60% or 24-44%), no-edges bar (4%) -->
  <!-- Bar width 80, gap 20 -->

  <!-- ===== INSTNCT group ===== -->
  <!-- With edges: 56-60% range.  56% -> y=310-192=118; 60% -> y=310-205.7=104.3. Bar height range 104.3-310 = 205.7 -->
  <!-- Use mean 58% -> y=310-198.8=111.2, height 198.8. Overlay a darker cap 56-60. -->
  <rect x="180" y="111.2" width="80" height="198.8" class="withedges"/>
  <!-- range bracket (56-60) - draw a white/subtle line at 60 and 56 -->
  <line x1="180" y1="104.3" x2="260" y2="104.3" stroke="#c9d1d9" stroke-width="2"/>
  <line x1="180" y1="118.0" x2="260" y2="118.0" stroke="#c9d1d9" stroke-width="2"/>
  <!-- Tick connecting them -->
  <line x1="220" y1="104.3" x2="220" y2="118.0" stroke="#c9d1d9" stroke-width="2"/>
  <text x="220" y="96" class="value" text-anchor="middle">56-60%</text>

  <!-- No edges: 4% -> y=310-13.71=296.29, height 13.71 -->
  <rect x="280" y="296.29" width="80" height="13.71" class="noedges"/>
  <text x="320" y="290" class="value" text-anchor="middle">4%</text>

  <text x="270" y="330" class="labelbold" text-anchor="middle">INSTNCT library</text>
  <text x="270" y="346" class="axis" text-anchor="middle">+52 to +56 pp</text>

  <!-- ===== ListNet group ===== -->
  <!-- With edges: 24-44% range. 24% -> y=310-82.3=227.7; 44% -> y=310-150.8=159.2 -->
  <!-- Bar from y=159.2, height = 310-159.2 = 150.8 -->
  <rect x="430" y="159.2" width="80" height="150.8" class="withedges"/>
  <line x1="430" y1="159.2" x2="510" y2="159.2" stroke="#c9d1d9" stroke-width="2"/>
  <line x1="430" y1="227.7" x2="510" y2="227.7" stroke="#c9d1d9" stroke-width="2"/>
  <line x1="470" y1="159.2" x2="470" y2="227.7" stroke="#c9d1d9" stroke-width="2"/>
  <text x="470" y="151" class="value" text-anchor="middle">24-44%</text>

  <!-- No edges: 4% -->
  <rect x="530" y="296.29" width="80" height="13.71" class="noedges"/>
  <text x="570" y="290" class="value" text-anchor="middle">4%</text>

  <text x="520" y="330" class="labelbold" text-anchor="middle">ListNet sep I/O</text>
  <text x="520" y="346" class="axis" text-anchor="middle">+20 to +40 pp</text>

  <!-- Legend -->
  <g>
    <rect x="200" y="366" width="16" height="12" class="withedges"/>
    <text x="222" y="377" class="label">With edges</text>
    <rect x="340" y="366" width="16" height="12" class="noedges"/>
    <text x="362" y="377" class="label">Without edges</text>
    <line x1="450" y1="372" x2="470" y2="372" class="baseline"/>
    <text x="476" y="377" class="label">Random baseline</text>
  </g>
</svg>
